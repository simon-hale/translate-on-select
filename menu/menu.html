<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="menu.pageTitle">划词翻译</title>
    <link rel="stylesheet" href="menu.css" />
  </head>

  <body>
    <main class="popup-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>

      <section class="panel control-panel">
        <div class="panel-header">
          <p class="eyebrow">Translate on Select</p>
          <h1 data-i18n="menu.heading">划词翻译</h1>
        </div>

        <div class="field-group">
          <label class="field-label" for="targetLang" data-i18n="menu.targetLanguageLabel">目标语言</label>
          <div class="select-wrap">
            <select id="targetLang" data-i18n-aria-label="menu.targetLanguageLabel"></select>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="uiLanguageSelect" data-i18n="menu.uiLanguageLabel">界面语言</label>
          <div class="select-wrap">
            <select id="uiLanguageSelect" data-i18n-aria-label="menu.uiLanguageLabel"></select>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="quickModeSelect" data-i18n="menu.quickModeLabel">快速切换模式</label>
          <div class="select-wrap">
            <select id="quickModeSelect" data-i18n-aria-label="menu.quickModeLabel"></select>
          </div>
        </div>

        <div class="field-group" id="quickServerGroup" hidden>
          <label class="field-label" for="quickApiSelectServer" data-i18n="menu.quickServerLabel">服务器端点</label>
          <div class="select-wrap">
            <select id="quickApiSelectServer" data-i18n-aria-label="menu.quickServerLabel"></select>
          </div>
        </div>

        <div class="field-group" id="quickApiGroup" hidden>
          <label class="field-label" for="quickApiSelect" data-i18n="menu.quickApiLabel">API 来源</label>
          <div class="select-wrap">
            <select id="quickApiSelect" data-i18n-aria-label="menu.quickApiLabel"></select>
          </div>
        </div>

        <div class="field-group" id="streamGroup" hidden>
          <label class="field-label" for="streamDeepseekSelect" data-i18n="menu.streamModeLabel">Deepseek 输出模式</label>
          <div class="select-wrap">
            <select id="streamDeepseekSelect" data-i18n-aria-label="menu.streamModeLabel"></select>
          </div>
        </div>
      </section>

      <footer class="footer-bar">
        <p class="storage-note" data-i18n="menu.storageNote">配置仅保存在本地。</p>
        <div class="footer-actions">
          <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
            <span class="theme-toggle-icon" aria-hidden="true"></span>
          </button>
          <button id="openOptionsBtn" class="ghost-button" type="button" data-i18n="menu.moreSettingsButton">更多设置</button>
        </div>
      </footer>
    </main>

    <script src="../shared/i18n.js"></script>
    <script src="../shared/theme.js"></script>
    <script src="menu.js"></script>
  </body>
</html>
